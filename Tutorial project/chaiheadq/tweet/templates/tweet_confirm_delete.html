{% extends "layout.html" %}

{% block content %}
<h2>Are you sure you want to delete the tweet?</h2>

<form method="POST">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Delete</button>
    <a class="btn btn-secondary" href="{% url 'tweet_list' %}">Cancel</a>
</form>

{% endblock %}
